<form class="bg-amber-400 flex flex-col w-96 p-2" [formGroup]="formularioInicio" (ngSubmit)="conectarse()">
    <h1 class="text-2xl">Iniciar Sesion</h1>
    <input type="text" class="border shadow" placeholder="Ingrese el nombre de usuario...">
    <input type="password" class="border shadow" placeholder="Ingrese la contraseña...">
    <button class="bg-green-400" type="submit">Conectarse</button>
</form>
